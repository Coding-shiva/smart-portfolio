version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: portfolio-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=http://localhost:8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-}
    depends_on:
      - mongodb
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  uploads-data:
